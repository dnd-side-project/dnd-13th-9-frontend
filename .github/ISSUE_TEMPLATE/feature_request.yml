## 추가 설명

- 이 스크립트는 커밋 메시지 작성 시 자동으로 실행됩니다.
- 브랜치명이 `feat/#3`처럼 끝에 `#숫자`가 있을 때만 동작합니다.
- 이미 커밋 메시지에 `(#3)`이 있으면 중복 추가하지 않습니다.
- 커밋 메시지 린트(`commitlint`)는 선택 사항이니, 필요 없으면 해당 줄을 삭제해도 됩니다.

---

## 예시

- 브랜치명: `feat/#12`
- 커밋 메시지: `Add login feature`
- 실제 커밋 메시지: `Add login feature (#12)`

---

